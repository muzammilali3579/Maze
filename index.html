<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maze Escape - Balanced Mode</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#111827;
    font-family:Arial;
    color:white;
}
canvas{
    background:black;
    border:3px solid #555;
}
.info{margin:8px;}
button{
    padding:8px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
button:hover{background:#1d4ed8;}
</style>
</head>
<body>

<h2>Maze Escape</h2>
<div class="info">
Time: <span id="time">0</span>s |
Lives: <span id="lives">3</span>
</div>
<canvas id="maze" width="540" height="540"></canvas>
<button onclick="restart()">Restart</button>

<script>
const canvas=document.getElementById("maze");
const ctx=canvas.getContext("2d");

const rows=18, cols=18;
const size=canvas.width/cols;

let grid=[], stack=[];
let player={x:0,y:0};
let end={x:cols-1,y:rows-1};
let lives=3, timer=0;
let traps=[], teleports=[];
let fogRadius=4;
let interval;

class Cell{
constructor(x,y){
this.x=x; this.y=y;
this.walls=[true,true,true,true];
this.visited=false;
}
draw(){
let x=this.x*size;
let y=this.y*size;
ctx.strokeStyle="white";
if(this.walls[0]) line(x,y,x+size,y);
if(this.walls[1]) line(x+size,y,x+size,y+size);
if(this.walls[2]) line(x+size,y+size,x,y+size);
if(this.walls[3]) line(x,y+size,x,y);
}
}
function line(x1,y1,x2,y2){
ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}
function index(x,y){
if(x<0||y<0||x>=cols||y>=rows) return -1;
return x+y*cols;
}

function generate(){
grid=[]; stack=[];
for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){
grid.push(new Cell(x,y));
}}
let current=grid[0];
current.visited=true;
while(true){
let neighbors=[];
let dirs=[
{dx:0,dy:-1,w:0,o:2},
{dx:1,dy:0,w:1,o:3},
{dx:0,dy:1,w:2,o:0},
{dx:-1,dy:0,w:3,o:1}
];
for(let d of dirs){
let next=grid[index(current.x+d.dx,current.y+d.dy)];
if(next && !next.visited){
neighbors.push({cell:next,dir:d});
}}
if(neighbors.length>0){
let r=neighbors[Math.floor(Math.random()*neighbors.length)];
current.walls[r.dir.w]=false;
r.cell.walls[r.dir.o]=false;
stack.push(current);
current=r.cell;
current.visited=true;
}else if(stack.length>0){
current=stack.pop();
}else break;
}
}

function placeSpecial(){
traps=[];
teleports=[];
for(let i=0;i<4;i++){
traps.push(randomCell());
}
teleports.push(randomCell());
}

function randomCell(){
return {
x:Math.floor(Math.random()*cols),
y:Math.floor(Math.random()*rows)
};
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let cell of grid){
if(Math.abs(cell.x-player.x)<=fogRadius &&
Math.abs(cell.y-player.y)<=fogRadius){
cell.draw();
}
}
drawTile(end,"green");
drawTile(player,"red");
for(let t of traps) drawTile(t,"purple");
for(let t of teleports) drawTile(t,"cyan");
}

function drawTile(obj,color){
if(Math.abs(obj.x-player.x)<=fogRadius &&
Math.abs(obj.y-player.y)<=fogRadius){
ctx.fillStyle=color;
ctx.fillRect(obj.x*size+6,obj.y*size+6,size-12,size-12);
}
}

function move(dx,dy){
let current=grid[index(player.x,player.y)];
if(dx===0 && dy===-1 && !current.walls[0]) player.y--;
if(dx===1 && dy===0 && !current.walls[1]) player.x++;
if(dx===0 && dy===1 && !current.walls[2]) player.y++;
if(dx===-1 && dy===0 && !current.walls[3]) player.x--;
checkSpecial();
draw();
}

function checkSpecial(){
for(let t of traps){
if(player.x===t.x && player.y===t.y){
lives--;
document.getElementById("lives").textContent=lives;
if(lives<=0){
alert("Game Over!");
restart();
}
}
}
for(let t of teleports){
if(player.x===t.x && player.y===t.y){
player=randomCell();
}
}
if(player.x===end.x && player.y===end.y){
alert("You Escaped in "+timer+" seconds!");
restart();
}
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp") move(0,-1);
if(e.key==="ArrowDown") move(0,1);
if(e.key==="ArrowLeft") move(-1,0);
if(e.key==="ArrowRight") move(1,0);
});

function restart(){
lives=3; timer=0;
document.getElementById("lives").textContent=lives;
document.getElementById("time").textContent=timer;
clearInterval(interval);
interval=setInterval(()=>{
timer++;
document.getElementById("time").textContent=timer;
},1000);
player={x:0,y:0};
end={x:cols-1,y:rows-1};
generate();
placeSpecial();
draw();
}

restart();
</script>

</body>
</html>
